name: NodeJS Application CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubutnu-latest


    steps: 
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrest.SSH_KEY}}
          script : |
            cd /root/Node.js-application-CICD-Pipeline
            git pull
            docker-compose up -d --build
            